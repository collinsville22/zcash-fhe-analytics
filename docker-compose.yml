# Docker Compose for Zcash FHE Analytics Production Stack
version: '3.8'

services:
  # Main backend application
  backend:
    build: .
    container_name: zcash-fhe-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://zcash:fhe_password@postgres:5432/zcash_fhe_analytics
      - REDIS_URL=redis://redis:6379/0
      - FHE_SECURITY_LEVEL=high
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    networks:
      - zcash-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: zcash-fhe-postgres
    environment:
      - POSTGRES_DB=zcash_fhe_analytics
      - POSTGRES_USER=zcash
      - POSTGRES_PASSWORD=fhe_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zcash-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zcash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: zcash-fhe-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - zcash-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: zcash-fhe-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - zcash-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  zcash-network:
    driver: bridge
